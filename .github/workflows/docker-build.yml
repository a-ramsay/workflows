on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      target:
        required: false
        type: string
      env:
        required: false
        type: boolean
        default: false
      sha-tag:
        required: false
        type: boolean
        default: false
    outputs:
      image-url:
        description: Registry URL including tag for the image just built. Will use SHA tag if enabled, otherwise will use the branch tag.
        value: ${{ jobs.docker-build.outputs.image-url }}
    secrets:
      REGISTRY_PASSWORD:
        required: true

permissions:
  packages: write
  contents: read

jobs:
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-url: ${{ steps.set-output.outputs.image_url }}
    steps:
      - name: Download environment variables
        if: inputs.env
        uses: actions/download-artifact@v8.0.1
        with:
          name: env-vars

      - name: Export environment variables
        if: inputs.env
        run: |
          cat env.list >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Login to Docker registry
        uses: docker/login-action@v4.2.0
        with:
          registry: registry.aramsay.co.nz
          username: allan
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{inputs.image}}
          tags: |
            type=ref,event=branch
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # set branch name if PR or not default
            type=ref,event=branch,enable={{is_not_default_branch}}
            type=ref,event=pr
            # set tags if present
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            # Dynamically add SHA tag if sha_tag input is true
            ${{ inputs.sha-tag && 'type=sha,format=long' || '' }}

      - name: Extract cache metadata for Docker
        id: cache-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{inputs.image}}
          flavor: |
            suffix=cache
          tags: |
            type=ref,event=branch

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{inputs.dockerfile}}
          target: ${{inputs.target}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{inputs.image}}:main-cache
            type=registry,ref=${{steps.cache-meta.outputs.tags}}
          cache-to: type=registry,ref=${{steps.cache-meta.outputs.tags}},mode=max

      - name: Set output image URL
        id: set-output
        run: |
          # Parse the tags array into a bash array
          tags=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags')
          
          if [[ "${{ inputs.sha-tag }}" == "true" ]]; then
            # Get last element
            echo "image_url=$(echo $tags | jq -r '.[-1]')" >> $GITHUB_OUTPUT
          else
            # Get first element
            echo "image_url=$(echo $tags | jq -r '.[0]')" >> $GITHUB_OUTPUT
          fi
