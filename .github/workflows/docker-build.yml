on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      target:
        required: false
        type: string
      env:
        required: false
        type: boolean
        default: false
      sha_tag:
        required: false
        type: boolean
        default: false
    outputs:
      image_url:
        description: Registry URL including tag for the image just built. Will use SHA tag if enabled, otherwise will use the branch tag.
        value: ${{ jobs.docker-build.outputs.image_url }}
    secrets:
      REGISTRY_PASSWORD:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ inputs.sha_tag && fromJson(steps.meta.outputs.json).tags[fromJson(steps.meta.outputs.json).tags.length-1] || fromJson(steps.meta.outputs.json).tags[0]}}
    steps:
      - name: Download environment variables
        if: inputs.env
        uses: actions/download-artifact@v4
        with:
          name: env-vars

      - name: Export environment variables
        if: inputs.env
        run: |
          cat env.list >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.aramsay.co.nz
          username: allan
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{inputs.image}}
          tags: |
            type=ref,event=branch
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Dynamically add SHA tag if sha_tag input is true
            ${{ inputs.sha_tag && 'type=sha,format=long' || '' }}

      - name: Extract cache metadata for Docker
        id: cache-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{inputs.image}}
          flavor: |
            suffix=cache
          tags: |
            type=ref,event=branch

      - name: Build and push Docker images
        uses: docker/build-push-action@v6.13.0
        with:
          context: .
          file: ${{inputs.dockerfile}}
          target: ${{inputs.target}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{inputs.image}}:main-cache
            type=registry,ref=${{steps.cache-meta.outputs.tags}}
          cache-to: type=registry,ref=${{steps.cache-meta.outputs.tags}},mode=max
